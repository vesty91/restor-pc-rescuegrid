version: "3.8"

# ===== Restor-PC RescueGrid — Stack Synology / NAS =====
# Déploiement production avec PostgreSQL, MinIO (S3), Nginx reverse proxy
# Usage : docker-compose -f docker-compose.synology.yml up -d

services:
  # === Base de données PostgreSQL ===
  postgres:
    image: postgres:16-alpine
    container_name: rescuegrid_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rescuegrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rescuegrid2026}
      POSTGRES_DB: ${POSTGRES_DB:-rescuegrid}
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    networks:
      - rescuegrid
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rescuegrid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === MinIO (stockage S3 compatible) ===
  minio:
    image: minio/minio:latest
    container_name: rescuegrid_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rescuegrid2026}
    volumes:
      - ./volumes/minio:/data
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    networks:
      - rescuegrid
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # === Nginx Reverse Proxy ===
  nginx:
    image: nginx:alpine
    container_name: rescuegrid_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # Certificats SSL (optionnel)
      - ./volumes/static:/var/www/static:ro
    depends_on:
      - backend
    networks:
      - rescuegrid

  # === Backend FastAPI ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rescuegrid_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rescuegrid}:${POSTGRES_PASSWORD:-rescuegrid2026}@postgres:5432/${POSTGRES_DB:-rescuegrid}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-2026}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-rescuegrid2026}
      STORAGE_PATH: /app/storage
    volumes:
      - ./volumes/storage:/app/storage
      - ./volumes/reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rescuegrid
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # === Optionnel : pgAdmin (administration PostgreSQL) ===
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rescuegrid_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@rescuegrid.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-rescuegrid2026}
    ports:
      - "5050:80"
    volumes:
      - ./volumes/pgadmin:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - rescuegrid

volumes:
  postgres_data:
  minio_data:
  storage_data:
  reports_data:

networks:
  rescuegrid:
    driver: bridge