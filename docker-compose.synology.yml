version: "3.8"

# ===== Restor-PC RescueGrid — Stack Synology / NAS =====
# Déploiement production avec PostgreSQL, MinIO (S3), Nginx reverse proxy
# Usage : docker compose -f docker-compose.synology.yml up -d
#
# Project name fixe (`name:`) → image `rescuegrid-backend` et réseau
# `rescuegrid_rescuegrid` quel que soit le dossier hôte (aligné avec
# scripts/nas_auto_deploy.sh IMAGE_REPO=rescuegrid-backend).
#
# Sécurité : aucun mot de passe par défaut n'est fourni ci-dessous (syntaxe
# ${VAR:?message} = docker-compose refuse de démarrer si la variable n'est pas
# définie dans .env). Créer un fichier .env à côté de ce fichier avec des
# valeurs uniques et fortes pour POSTGRES_PASSWORD, MINIO_ROOT_PASSWORD,
# SECRET_KEY, ADMIN_PASSWORD, PGADMIN_PASSWORD avant le premier démarrage —
# voir .env.example.

name: rescuegrid

services:
  # === Base de données PostgreSQL ===
  postgres:
    image: postgres:16-alpine
    container_name: rescuegrid_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rescuegrid}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Definir POSTGRES_PASSWORD dans .env (mot de passe fort et unique)}"
      POSTGRES_DB: ${POSTGRES_DB:-rescuegrid}
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    networks:
      - rescuegrid
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rescuegrid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === MinIO (stockage S3 compatible) — profil optionnel `s3` ===
  # Non utilisé actuellement par le backend (stockage fichier classique).
  # Démarrer seulement si besoin : docker compose -f docker-compose.synology.yml --profile s3 up -d
  # Ports liés à 127.0.0.1 uniquement : MinIO est un outil d'administration du
  # stockage, pas un service à exposer publiquement. Accès distant via tunnel
  # SSH/VPN, ou retirer le bind 127.0.0.1 seulement si un pare-feu NAS filtre déjà
  # ces ports depuis l'extérieur.
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: rescuegrid_minio
    profiles: ["s3"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?Definir MINIO_ROOT_PASSWORD dans .env (mot de passe fort et unique)}"
    volumes:
      - ./volumes/minio:/data
    ports:
      - "127.0.0.1:19000:9000"   # API S3 (19000 : le 9000 est deja pris par Portainer sur ce NAS)
      - "127.0.0.1:9001:9001"   # Console web
    networks:
      - rescuegrid
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # === Nginx Reverse Proxy — profil optionnel `nginx` ===
  # Sur Synology, le Reverse Proxy DSM est préféré (voir docs/SYNOLOGY_DEPLOY.md).
  # Démarrer seulement si les ports 80/443 du NAS sont libres :
  #   docker compose -f docker-compose.synology.yml --profile nginx up -d
  nginx:
    image: nginx:alpine
    container_name: rescuegrid_nginx
    profiles: ["nginx"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # Certificats SSL (optionnel)
      - ./volumes/static:/var/www/static:ro
    depends_on:
      - backend
    networks:
      - rescuegrid

  # === Backend FastAPI ===
  backend:
    image: rescuegrid-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      # Lu depuis le fichier VERSION à la racine par nas_auto_deploy.sh
      # (export APP_VERSION avant `docker compose build`) — voir
      # backend/app/version.py. Vide par défaut : le Dockerfile retombe alors
      # sur "0.0.0-dev" pour un build manuel sans cette variable exportée.
      args:
        APP_VERSION: ${APP_VERSION:-0.0.0-dev}
    container_name: rescuegrid_backend
    restart: unless-stopped
    # Charge TOUTES les variables de .env (MAIL_*, SMTP_*, OAUTH_*, RESTORPC_*,
    # BACKUP_SCHEDULE_*, MAX_*, UPLOAD_*...) dans le conteneur. Le bloc
    # "environment:" ci-dessous a priorite sur env_file et sert a imposer les
    # variables critiques obligatoires (DATABASE_URL, SECRET_KEY, ADMIN_PASSWORD).
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-rescuegrid}:${POSTGRES_PASSWORD:?Definir POSTGRES_PASSWORD dans .env}@postgres:5432/${POSTGRES_DB:-rescuegrid}"
      SECRET_KEY: "${SECRET_KEY:?Definir SECRET_KEY dans .env, ex. openssl rand -hex 32}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?Definir ADMIN_PASSWORD dans .env (mot de passe fort et unique)}"
      # Surcharge runtime : un ARG Docker vide ("") écrase le défaut Dockerfile
      # et faisait planter FastAPI (version OpenAPI vide). Toujours fournir une
      # valeur non vide ici, même si le build a échoué à injecter VERSION.
      APP_VERSION: "${APP_VERSION:-12.6.6}"
      # false par defaut pour ne pas casser la connexion tant que HTTPS n'est pas
      # configure sur nginx (etape 5 de docs/SYNOLOGY_DEPLOY.md) — passer a true
      # dans .env une fois un certificat TLS actif.
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      STORAGE_PATH: /app/storage
    # Port lié à 127.0.0.1 uniquement : permet au Reverse Proxy natif de DSM
    # (qui tourne sur le NAS lui-même) d'atteindre le backend directement en
    # http://127.0.0.1:8080, sans passer par le conteneur nginx ci-dessus —
    # voir docs/SYNOLOGY_DEPLOY.md étape 5 (voie recommandée sur Synology).
    # Port hôte 8080 (et non 8000) car 8000 est déjà pris par Portainer sur ce NAS.
    ports:
      - "127.0.0.1:8080:8000"
    volumes:
      - ./volumes/storage:/app/storage
      - ./volumes/reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rescuegrid
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # === Optionnel : pgAdmin — profil `admin` ===
  # docker compose -f docker-compose.synology.yml --profile admin up -d
  # Port lié à 127.0.0.1 uniquement (voir remarque MinIO ci-dessus) : outil
  # d'administration, pas un service public.
  pgadmin:
    image: dpage/pgadmin4:9.16
    container_name: rescuegrid_pgadmin
    profiles: ["admin"]
    restart: unless-stopped
    environment:
      # pgAdmin valide strictement le format de l'email et rejette les TLD
      # reserves comme .local — utilisez PGADMIN_EMAIL dans .env pour une
      # adresse reelle si besoin (ce compte n'a aucun usage d'envoi de mail).
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@restor-pc.fr}
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD:?Definir PGADMIN_PASSWORD dans .env (mot de passe fort et unique)}"
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - ./volumes/pgadmin:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - rescuegrid

  # === Optionnel : Uptime Kuma (monitoring / alertes) ===
  # Toujours démarré avec la stack (pas de profil) : déjà utilisé en production
  # pour les alertes ntfy. Port exposé sur le LAN à http://<IP-du-NAS>:3001.
  # Le socket Docker est monté en lecture seule pour le moniteur "Docker Container".
  uptime_kuma:
    image: louislam/uptime-kuma:2.4.0
    container_name: rescuegrid_uptime_kuma
    restart: unless-stopped
    volumes:
      - ./volumes/uptime-kuma:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - rescuegrid

# Remarque : tous les services ci-dessus utilisent des bind mounts (./volumes/...)
# plutot que des volumes nommes Docker, pour pouvoir pointer ./volumes/storage
# vers un dossier partage Synology monte sur l'hote (voir docs/SYNOLOGY_DEPLOY.md).
# Aucun volume nomme n'est donc necessaire ici.

networks:
  rescuegrid:
    driver: bridge