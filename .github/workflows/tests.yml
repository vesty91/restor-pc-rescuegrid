name: Qualité backend

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Installation des dépendances
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Ruff (lint rapide)
        working-directory: backend
        run: ruff check app --select E,F --ignore E501 || true
      - name: Pytest (unitaires progressifs)
        working-directory: backend
        run: |
          pip install pytest
          python -m pytest tests/test_unit_pytest.py -q
      - name: Suite de tests
        working-directory: backend
        run: python tests/run_tests.py
