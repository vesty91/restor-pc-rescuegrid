name: Qualité backend

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Installation des dépendances
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov mypy
      - name: Ruff (lint rapide)
        working-directory: backend
        # E402 ignoré : imports différés volontaires dans main.py / models.py
        run: ruff check app --select E,F --ignore E501,E402
      - name: Vérification des migrations SQLite
        working-directory: backend
        env:
          DATABASE_URL: sqlite:////tmp/rescuegrid_migration_test.db
        run: python -m alembic upgrade head
      - name: Mypy (typage progressif)
        working-directory: backend
        # Non bloquant tant que le typage n'est pas généralisé au dépôt.
        continue-on-error: true
        run: python -m mypy app --config-file ../pyproject.toml
      - name: Pytest (unitaires + couverture)
        working-directory: backend
        run: |
          python -m pytest tests/test_unit_pytest.py -q \
            --cov=app --cov-report=term-missing --cov-fail-under=0
      - name: Suite de tests
        working-directory: backend
        run: python tests/run_tests.py
