<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paiement confirmé - Restor-PC RescueGrid</title>
  <style>
    :root{color-scheme:dark;--bg:#040b14;--card:#0d1b2f;--line:#1b3656;--text:#eef7ff;--muted:#93a9c5;--green:#22c55e;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Segoe UI,Inter,Arial,sans-serif;color:var(--text);min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#020812 0%,#06101d 50%,#02050b 100%);
    }
    .wrap{width:min(420px,94vw);text-align:center}
    .icon{font-size:52px;color:var(--green);margin-bottom:14px}
    .card{
      background:linear-gradient(180deg,rgba(13,27,47,.96),rgba(7,19,33,.98));
      border:1px solid var(--line);border-radius:18px;padding:32px 26px;
      box-shadow:0 22px 60px rgba(0,0,0,.5);
    }
    h1{font-size:20px;margin-bottom:10px}
    p{color:var(--muted);font-size:14px;line-height:1.6}
    .ref{margin-top:14px;font-size:13px;color:#9bd2ff}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="icon">✓</div>
      <h1>Paiement bien reçu</h1>
      <p>Merci ! Votre paiement a été traité avec succès. Un reçu vous sera envoyé par email dès que la confirmation aura été validée par notre système.</p>
      {% if invoice_number %}
      <div class="ref">Référence facture : {{ invoice_number }}</div>
      {% endif %}
      <p style="margin-top:18px">Vous pouvez fermer cette page.</p>
    </div>
  </div>
</body>
</html>
