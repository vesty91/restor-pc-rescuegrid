# alembic.ini — Restor-PC RescueGrid
# Ne jamais commiter ce fichier avec un vrai mot de passe.
# La valeur de sqlalchemy.url est écrasée par env.py via DATABASE_URL.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# URL de fallback (écrasée par env.py via os.getenv)
sqlalchemy.url = sqlite:///./rescuegrid.db

[post_write_hooks]
# optionnel : formatage auto après génération de migration
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
