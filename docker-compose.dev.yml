# docker-compose.dev.yml — environnement de développement local uniquement.
#
# Pour un déploiement réel (NAS Synology, production), utiliser
# docker-compose.synology.yml (PostgreSQL, migrations Alembic, reverse proxy)
# — voir docs/SYNOLOGY_DEPLOY.md. Ce fichier-ci n'est qu'un raccourci pratique
# pour tester l'app en SQLite dans un conteneur, en local.
#
# Les secrets (SECRET_KEY, ADMIN_PASSWORD) sont lus depuis .env (copier
# .env.example vers .env à la racine du projet) et n'ont plus de valeur par
# défaut en dur ici : sans .env, docker compose refuse de démarrer plutôt que
# d'utiliser un mot de passe connu/documenté.
services:
  dashboard:
    build:
      context: ./backend
      args:
        APP_VERSION: ${APP_VERSION:-0.0.0-dev}
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: sqlite:///./rescuegrid.db
      SECRET_KEY: ${SECRET_KEY:?Definir SECRET_KEY dans .env (voir .env.example) - openssl rand -hex 32}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Definir ADMIN_PASSWORD dans .env (voir .env.example)}
      APP_VERSION: ${APP_VERSION:-0.0.0-dev}
    volumes:
      - ./backend/storage:/app/storage
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
