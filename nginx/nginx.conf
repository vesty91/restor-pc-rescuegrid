worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 2g;

    upstream rescuegrid_backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://rescuegrid_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }
    }

    # ===== HTTPS (à activer une fois un certificat disponible) =====
    # Décommenter ce bloc, placer cert.pem/key.pem dans ./nginx/ssl/ (déjà monté
    # par docker-compose.synology.yml), rediriger le bloc "listen 80" ci-dessus
    # vers ce serveur (return 301 https://$host$request_uri;), puis définir
    # COOKIE_SECURE=true dans .env — voir docs/SYNOLOGY_DEPLOY.md étape 5.
    #
    # server {
    #     listen 443 ssl;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
