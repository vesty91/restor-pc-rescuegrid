worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 2g;

    upstream rescuegrid_backend {
        server backend:8000;
    }

    # NOTE IMPORTANTE (Synology) : ce conteneur nginx n'est utile que si tu
    # N'utilises PAS le "Reverse Proxy" natif de DSM (Panneau de configuration
    # > Portail de connexion > Avancé > Reverse Proxy). Sur Synology, la voie
    # recommandée est DSM (certificat Let's Encrypt géré et renouvelé
    # automatiquement par le NAS) — voir docs/SYNOLOGY_DEPLOY.md étape 5.
    # N'utilise ce conteneur qu'en alternative (ports 80/443 non déjà occupés
    # par DSM lui-même), après avoir déposé un certificat dans ./nginx/ssl/.

    server {
        listen 80;
        server_name espace-client.restor-pc.fr;

        # Décommenter une fois le certificat en place dans ./nginx/ssl/
        # (voir bloc HTTPS ci-dessous) pour forcer la redirection HTTPS :
        # return 301 https://$host$request_uri;

        location / {
            proxy_pass http://rescuegrid_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }
    }

    # ===== HTTPS (à activer une fois un certificat disponible) =====
    # Décommenter ce bloc, placer cert.pem/key.pem dans ./nginx/ssl/ (déjà monté
    # par docker-compose.synology.yml), décommenter le "return 301" ci-dessus,
    # puis définir COOKIE_SECURE=true dans .env — voir docs/SYNOLOGY_DEPLOY.md
    # étape 5.
    #
    # server {
    #     listen 443 ssl;
    #     server_name espace-client.restor-pc.fr;
    #
    #     ssl_certificate     /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location / {
    #         proxy_pass http://rescuegrid_backend;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #         proxy_read_timeout 300s;
    #     }
    # }
}
